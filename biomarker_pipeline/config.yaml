data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  min_length: 50
  max_length: 2000
  # Se raw/ estiver vazia, gera dados sintéticos de 3 marcadores fictícios
  use_synthetic_if_empty: true
  # Quantidade de sequências sintéticas por classe (só usado se raw/ vazio)
  synthetic_n_per_class: 100

kmer:
  k: 3                            # 20^3 = 8000 dimensões
  normalize: true                 # frequência relativa
  filter_zero_variance: true      # remove colunas constantes

svd:
  n_components_to_test: [50, 100, 200, 300, 500]
  variance_threshold: 0.95

training:
  test_size: 0.2
  random_state: 42
  cv_folds: 5
  models:
    - svm
    - random_forest
    - xgboost

shap:
  n_background_samples: 100
  top_k_features: 20
